<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520" role="img" aria-labelledby="title desc">
  <title id="title">Ivan personal blog logo</title>
  <desc id="desc">Minimal cloud-native themed logo for Ivan with a stylized I, cloud outline, terminal prompt, network nodes, cube, and wordmark.</desc>
  <defs>
    <style>
      .dark{stroke:#24292f;fill:none;stroke-width:16;stroke-linecap:round;stroke-linejoin:round}
      .dark-fill{fill:#24292f}
      .blue{stroke:#2f6feb;fill:none;stroke-width:14;stroke-linecap:round;stroke-linejoin:round}
      .blue-fill{fill:#2f6feb}
      .gray{stroke:#8b949e;fill:none;stroke-width:10;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:14 16}
      .word{fill:#24292f;font-family:Inter,Segoe UI,Arial,sans-serif;font-size:90px;font-weight:600}
    </style>
  </defs>

  <!-- cloud outline -->
  <path class="dark" d="M160 300
           C112 300 74 262 74 214
           C74 166 112 128 160 128
           C171 128 181 130 191 133
           C206 77 258 36 320 36
           C385 36 440 81 452 142
           C463 138 475 136 488 136
           C536 136 574 174 574 222
           C574 245 565 266 549 282"/>

  <!-- terminal prompt -->
  <path class="blue" d="M128 214 L152 234 L128 254"/>
  <line class="dark" x1="178" y1="255" x2="212" y2="255"/>

  <!-- stylized I -->
  <path class="dark-fill" d="M310 110 h90 c0 0-18 6-28 15 c-6 6-8 18-8 36v162c0 18 2 30 8 36 c10 9 28 15 28 15h-90 c0 0 18-6 28-15 c6-6 8-18 8-36V161c0-18-2-30-8-36 c-10-9-28-15-28-15z"/>
  <polygon class="blue-fill" points="286,110 350,110 350,186"/>
  <polygon class="blue-fill" points="364,324 418,374 364,374"/>

  <!-- network nodes -->
  <line class="dark" x1="500" y1="182" x2="500" y2="255"/>
  <line class="dark" x1="500" y1="255" x2="570" y2="255"/>
  <line class="dark" x1="500" y1="255" x2="442" y2="298"/>
  <line class="dark" x1="500" y1="255" x2="500" y2="327"/>
  <circle cx="500" cy="164" r="18" class="blue"/>
  <circle cx="500" cy="255" r="18" class="dark"/>
  <circle cx="590" cy="255" r="18" class="blue"/>
  <circle cx="500" cy="347" r="18" class="blue"/>

  <!-- cube -->
  <polygon class="blue-fill" points="320,392 364,418 320,444 276,418"/>
  <polygon class="dark-fill" points="276,418 320,444 320,508 276,482"/>
  <polygon class="dark-fill" points="364,418 320,444 320,508 364,482"/>

  <!-- dashed container base -->
  <line class="gray" x1="212" y1="384" x2="212" y2="456"/>
  <line class="gray" x1="448" y1="384" x2="448" y2="456"/>
  <path class="gray" d="M224 480 L320 532 L436 480"/>
  <circle cx="212" cy="478" r="12" class="dark-fill"/>
  <circle cx="448" cy="478" r="12" class="dark-fill"/>

  <!-- wordmark -->
  <circle cx="492" cy="402" r="9" class="blue-fill"/>
  <text x="482" y="505" class="word">ivan</text>
</svg>
