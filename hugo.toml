baseURL = "https://blog.ivanwz.com/"
languageCode = "zh-CN"
defaultContentLanguage = "zh-cn"
title = "云栈笔记"
enableRobotsTXT = true
enableGitInfo = false
hasCJKLanguage = true
summaryLength = 120

[pagination]
  pagerSize = 9

[params]
  description = "专注 Linux、云原生、AI 与工程实践的中文技术博客。"
  author = "站点作者"
  keywords = ["Linux", "云原生", "AI", "Kubernetes", "DevOps", "技术博客"]
  mainSections = ["posts"]
  dateFormat = "2006-01-02"
  defaultCover = "/images/tech-cover.svg"
  giscusEnabled = false

[params.social]
  github = "https://github.com/yourname"
  email = "hello@example.com"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[permalinks]
  posts = "/posts/:sections/:slug/"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    lineNumbersInTable = false
    style = "github-dark"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[menu]
  [[menu.main]]
    name = "首页"
    pageRef = "/"
    weight = 10
  [[menu.main]]
    name = "文章"
    pageRef = "/posts"
    weight = 20
  [[menu.main]]
    name = "分类"
    pageRef = "/categories"
    weight = 30
  [[menu.main]]
    name = "标签"
    pageRef = "/tags"
    weight = 40
  [[menu.main]]
    name = "专题"
    pageRef = "/series"
    weight = 50
  [[menu.main]]
    name = "搜索"
    pageRef = "/search"
    weight = 60
  [[menu.main]]
    name = "关于"
    pageRef = "/pages/about"
    weight = 70

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
