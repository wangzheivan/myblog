<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>博客后台管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">IB</span>
          <div>
            <strong>博客后台</strong>
            <span>Ivan Blog Admin</span>
          </div>
        </div>
        <nav>
          <button class="nav-item active" data-view="articles">文章</button>
          <button class="nav-item" data-view="uploads">图片</button>
          <button class="nav-item" data-view="pages">页面</button>
          <button class="nav-item" data-view="settings">站点设置</button>
        </nav>
      </aside>

      <main>
        <header class="topbar">
          <div>
            <h1 id="view-title">文章管理</h1>
            <p id="view-subtitle">上传 Markdown，编辑 Front Matter，并提交到 GitHub 分支。</p>
          </div>
          <div class="session">
            <span id="session-label">检查登录中...</span>
            <button id="login-button" class="ghost hidden">GitHub 登录</button>
            <button id="logout-button" class="ghost hidden">退出</button>
          </div>
        </header>

        <section id="notice" class="notice hidden"></section>

        <section id="locked" class="panel hidden">
          <h2>需要登录</h2>
          <p>请使用授权的 GitHub 账号登录后管理博客内容。</p>
          <button id="locked-login">使用 GitHub 登录</button>
        </section>

        <section id="articles-view" class="view">
          <div class="toolbar">
            <button id="new-article">新建文章</button>
            <label class="file-button">
              上传 Markdown
              <input id="markdown-file" type="file" accept=".md,.markdown,text/markdown,text/plain" />
            </label>
            <button id="refresh-articles" class="secondary">刷新列表</button>
          </div>
          <div class="split">
            <div class="panel list-panel">
              <h2>文章列表</h2>
              <div id="article-list" class="item-list"></div>
            </div>
            <form id="article-form" class="panel editor">
              <div class="grid">
                <label>标题<input name="title" required /></label>
                <label>Slug<input name="slug" required /></label>
                <label>分类目录<input name="categoryDir" placeholder="cloud-native" required /></label>
                <label>分类<input name="categories" placeholder="云原生, Kubernetes" /></label>
                <label>标签<input name="tags" placeholder="RKE2, Rancher" /></label>
                <label>专题<input name="series" placeholder="Kubernetes 实践" /></label>
                <label>日期<input name="date" type="date" /></label>
                <label>封面<input name="cover" placeholder="/uploads/2026/06/cover.png" /></label>
              </div>
              <label>摘要<textarea name="description" rows="2"></textarea></label>
              <label>正文 Markdown<textarea name="body" rows="18" required></textarea></label>
              <label class="inline"><input name="draft" type="checkbox" /> 草稿</label>
              <div class="actions">
                <button type="submit">保存文章</button>
                <span id="article-path"></span>
              </div>
            </form>
          </div>
        </section>

        <section id="uploads-view" class="view hidden">
          <div class="toolbar">
            <label class="file-button">
              上传图片
              <input id="image-file" type="file" accept="image/*" />
            </label>
            <button id="refresh-uploads" class="secondary">刷新图片</button>
          </div>
          <div id="upload-list" class="media-grid"></div>
        </section>

        <section id="pages-view" class="view hidden">
          <div class="panel editor">
            <div class="toolbar compact">
              <button id="load-about" class="secondary">加载关于页</button>
              <button id="save-about">保存关于页</button>
            </div>
            <textarea id="about-editor" rows="24" placeholder="content/pages/about.md"></textarea>
          </div>
        </section>

        <section id="settings-view" class="view hidden">
          <form id="settings-form" class="panel editor">
            <div class="grid">
              <label>站点标题<input name="siteTitle" /></label>
              <label>站点描述<input name="description" /></label>
              <label>作者名称<input name="authorName" /></label>
              <label>作者邮箱<input name="authorEmail" /></label>
              <label>作者标语<input name="headline" /></label>
              <label>主题配色<input name="colorScheme" placeholder="github" /></label>
              <label>默认外观
                <select name="defaultAppearance">
                  <option value="dark">dark</option>
                  <option value="light">light</option>
                </select>
              </label>
              <label>首页布局
                <select name="homepageLayout">
                  <option value="profile">profile</option>
                  <option value="page">page</option>
                  <option value="hero">hero</option>
                  <option value="card">card</option>
                  <option value="background">background</option>
                </select>
              </label>
            </div>
            <label>作者简介<textarea name="authorBio" rows="3"></textarea></label>
            <div class="checks">
              <label><input name="enableSearch" type="checkbox" /> 搜索</label>
              <label><input name="enableCodeCopy" type="checkbox" /> 代码复制</label>
              <label><input name="showTableOfContents" type="checkbox" /> 文章目录</label>
              <label><input name="showReadingTime" type="checkbox" /> 阅读时间</label>
              <label><input name="showWordCount" type="checkbox" /> 字数</label>
            </div>
            <div class="actions">
              <button type="submit">保存站点设置</button>
              <button id="load-settings" type="button" class="secondary">重新加载</button>
            </div>
          </form>
        </section>
      </main>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
