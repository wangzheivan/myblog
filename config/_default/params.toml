description = "专注 Linux、云原生、AI 与工程实践的中文技术博客。"
mainSections = ["posts"]
rssFullContent = true
favicon = "/favicon-32x32.png"
SortBy = "default"

[footer]
  since = 2026
  customText = ""

[dateFormat]
  published = "2006-01-02"
  lastUpdated = "2006-01-02 15:04"

[sidebar]
  compact = false
  avatar = "mylogo.png"
  subtitle = "Linux · Cloud Native · AI"

[article]
  headingAnchor = true
  math = false
  toc = true
  readingTime = true

  [article.list]
    showTags = true

  [article.license]
    enabled = false
    default = "Licensed under CC BY-NC-SA 4.0"

  [article.mermaid]
    look = "classic"
    lightTheme = "default"
    darkTheme = "dark"
    securityLevel = "strict"
    htmlLabels = true
    transparentBackground = false

[widgets]
  [[widgets.homepage]]
    type = "search"

  [[widgets.homepage]]
    type = "archives"
    [widgets.homepage.params]
      limit = 5

  [[widgets.homepage]]
    type = "categories"
    [widgets.homepage.params]
      limit = 10

  [[widgets.homepage]]
    type = "tag-cloud"
    [widgets.homepage.params]
      limit = 20

  [[widgets.page]]
    type = "toc"

[opengraph.twitter]
  site = ""
  card = "summary_large_image"

[colorScheme]
  toggle = true
  default = "auto"

[imageProcessing]
  autoOrient = false

  [imageProcessing.external]
    timeout = "5s"

  [imageProcessing.content]
    widths = [800, 1600, 2400]
    enabled = true

  [imageProcessing.thumbnail]
    enabled = true

[comments]
  enabled = false
  provider = "giscus"
