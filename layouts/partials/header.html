<header class="site-header">
  <nav class="nav-shell" aria-label="主导航">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="{{ site.Title }}">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>
        <strong>{{ site.Title }}</strong>
        <small>Linux · Cloud Native · AI</small>
      </span>
    </a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu" aria-label="打开导航">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div id="site-menu" class="nav-links">
      {{ range site.Menus.main }}
        <a href="{{ .URL }}" {{ if $.IsMenuCurrent .Menu . }}aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </div>
  </nav>
</header>
