<footer class="site-footer">
  <div class="footer-grid">
    <div>
      <strong>{{ site.Title }}</strong>
      <p>{{ site.Params.description }}</p>
    </div>
    <div>
      <span>导航</span>
      <a href="/posts/">文章归档</a>
      <a href="/search/">站内搜索</a>
      <a href="/index.xml">RSS 订阅</a>
    </div>
    <div>
      <span>联系</span>
      {{ with site.Params.social.github }}<a href="{{ . }}">GitHub</a>{{ end }}
      {{ with site.Params.social.email }}<a href="mailto:{{ . }}">{{ . }}</a>{{ end }}
    </div>
  </div>
  <p class="copyright">© {{ now.Year }} {{ site.Title }}. Built with Hugo and Pagefind.</p>
</footer>
