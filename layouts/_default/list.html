{{ define "main" }}
<section class="page-hero compact">
  <p class="eyebrow">Archive</p>
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p>{{ . }}</p>{{ end }}
</section>

<section class="article-grid">
  {{ range .Paginator.Pages }}
    {{ partial "article-card.html" . }}
  {{ end }}
</section>

{{ template "_internal/pagination.html" . }}
{{ end }}
