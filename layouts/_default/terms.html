{{ define "main" }}
<section class="page-hero compact">
  <p class="eyebrow">Taxonomy</p>
  <h1>{{ .Title }}</h1>
</section>
<section class="term-cloud">
  {{ range .Data.Terms.ByCount }}
    <a href="{{ .Page.RelPermalink }}">
      <span>{{ .Page.Title }}</span>
      <small>{{ .Count }}</small>
    </a>
  {{ end }}
</section>
{{ end }}
